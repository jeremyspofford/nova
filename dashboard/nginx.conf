server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS — resolves service names at request time,
    # not at startup, so nginx doesn't crash if an upstream isn't up yet.
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $upstream agent-core:8000;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        add_header Cache-Control "no-store" always;
    }

    location /v1/ {
        set $llm llm-gateway:8001;
        rewrite ^/v1/(.*)$ /$1 break;
        proxy_pass http://$llm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        add_header Cache-Control "no-store" always;
    }

    location /voice-api/ {
        set $voice voice-gateway:8003;
        rewrite ^/voice-api/(.*)$ /$1 break;
        proxy_pass http://$voice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location /ws {
        set $upstream chat-surface:8004;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
