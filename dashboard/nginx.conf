server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — defers resolution to request time so nginx doesn't
    # crash on startup when sibling containers are still initialising.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Proxy orchestrator API (agents, tasks, keys, usage)
    location /api/ {
        set $orch http://orchestrator:8000;
        rewrite ^/api/(.*) /api/$1 break;
        proxy_pass $orch;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy LLM Gateway (models list)
    location /v1/ {
        set $llm http://llm-gateway:8001;
        rewrite ^/v1/(.*) /v1/$1 break;
        proxy_pass $llm;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy Memory Service — strip /mem prefix before forwarding
    location /mem/ {
        set $mem http://memory-service:8002;
        rewrite ^/mem/(.*) /$1 break;
        proxy_pass $mem;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy Recovery Service
    location /recovery-api/ {
        set $recovery http://recovery:8888;
        rewrite ^/recovery-api/(.*) /$1 break;
        proxy_pass $recovery;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy Cortex — autonomous brain service
    location /cortex-api/ {
        set $cortex http://cortex:8100;
        rewrite ^/cortex-api/(.*) /$1 break;
        proxy_pass $cortex;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy Voice Service — STT/TTS
    location /voice-api/ {
        set $voice http://voice-service:8130;
        rewrite ^/voice-api/(.*) /$1 break;
        proxy_pass $voice;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 30s;
        client_max_body_size 25m;
    }

    # Proxy Chat Bridge — Telegram/Slack adapter management
    location /bridge-api/ {
        set $bridge http://chat-bridge:8090;
        rewrite ^/bridge-api/(.*) /$1 break;
        proxy_pass $bridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # Proxy Screenpipe Bridge — screen capture ingestion
    location /screenpipe-api/ {
        set $screenpipe http://screenpipe-bridge:8140;
        rewrite ^/screenpipe-api/(.*) /$1 break;
        proxy_pass $screenpipe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    # VS Code health probe only — iframe loads from localhost:8443 directly,
    # but the probe needs a same-origin path to avoid CORS.
    location /editor-vscode/ {
        set $editor_vscode http://editor-vscode:8443;
        rewrite ^/editor-vscode/(.*) /$1 break;
        proxy_pass $editor_vscode;
    }

    # Proxy Embedded Editor — Neovim (ttyd)
    # ttyd supports --base-path natively, so no rewrite needed.
    location /editor-neovim/ {
        set $editor_neovim http://editor-neovim:7681;
        proxy_pass $editor_neovim;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
