apiVersion: 1

# Nova's Postgres, provisioned read-only in spirit: dashboards only SELECT.
# Credentials come from the container environment (set in docker-compose.yml
# from the same .env values the stack already uses).
datasources:
  - name: Nova Postgres
    uid: nova-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: $POSTGRES_USER
    jsonData:
      database: nova
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $POSTGRES_PASSWORD
    isDefault: true
    editable: false
