# Nova AI Platform — NVIDIA GPU overlay
# Adds GPU device reservations for GPU-capable inference backends.
# Auto-included when nvidia-smi is detected (Makefile), or explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d

services:
  nova-vllm:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nova-sglang:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
