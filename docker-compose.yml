version: '3.8'

# Pinned so container labels/names are stable regardless of the checkout
# directory — the inference-control sidecar targets this project by name.
name: nova

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nova"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-nova-dev-password}@postgres:5432/nova
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OKF_MEMORY_DIR: /app/data/memory
      # shown read-only in Settings → Storage — the mount itself is fixed at
      # container-create time and can't be changed from inside the container
      NOVA_MEMORY_DIR_HOST: ${NOVA_MEMORY_DIR:-./data/memory}
      SEARXNG_URL: http://searxng:8080
      INFERENCE_CONTROL_URL: http://inference-control:9911
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # NOVA_MEMORY_DIR: point memory anywhere plain files can live — a NAS
      # mount, an Obsidian vault folder, another disk. Markdown in, markdown
      # out; the index rescans on startup and reindexes on write.
      - ${NOVA_MEMORY_DIR:-./data/memory}:/app/data/memory
      - ./backend:/app/backend:cached
    develop:
      watch:
        - path: ./backend/app
          action: sync
          target: /app/backend/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bundled local inference (optional): docker compose --profile inference up -d
  # CPU works for small models; for NVIDIA GPU add a deploy.resources.reservations
  # block (documented in README). Host-run Ollama: set the URL in Settings → Inference.
  ollama:
    image: ollama/ollama:latest
    profiles: ["inference"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # Docker control sidecar: the ONLY container holding the docker socket
  # (root-equivalent on the host — the backend never mounts it). Exposes a
  # fixed-verb API (status/start/stop of the bundled ollama service, nothing
  # parameterized) on the compose network only — no published ports.
  inference-control:
    build: ./inference-control
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./docker-compose.gpu.yml:/compose/docker-compose.gpu.yml:ro
    environment:
      # auto: use the GPU override when the docker NVIDIA runtime exists;
      # on/off force it (e.g. OLLAMA_GPU=on for Docker Desktop setups that
      # support --gpus without advertising an nvidia runtime)
      OLLAMA_GPU: ${OLLAMA_GPU:-auto}
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-nova-searxng-dev-secret}
      SEARXNG_BASE_URL: http://searxng:8080/
    ports:
      - "127.0.0.1:8380:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  ollama_models:
