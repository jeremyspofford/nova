# docker-compose.yml
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nova}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-core:
    build:
      context: .
      dockerfile: agent-core/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
      REDIS_URL: redis://redis:6379
      DOCKER_SOCKET_PROXY_URL: http://docker-socket-proxy:2375
      NOVA_WORKSPACE: ${NOVA_WORKSPACE:-/workspace}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.2
    environment:
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 1
      POST: 1
      DELETE: 1
      NETWORKS: 0
      VOLUMES: 0
      SWARM: 0
      CONFIGS: 0
      SECRETS: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  memory-service:
    build:
      context: .
      dockerfile: memory-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  llm-gateway:
    build:
      context: .
      dockerfile: llm-gateway/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  voice-gateway:
    build:
      context: .
      dockerfile: voice-gateway/Dockerfile
    env_file: .env
    ports:
      - "8003:8003"
    profiles: ["voice"]

  chat-surface:
    build:
      context: .
      dockerfile: chat-surface/Dockerfile
    env_file: .env
    environment:
      AGENT_CORE_URL: http://agent-core:8000
    ports:
      - "8004:8004"
    depends_on:
      agent-core:
        condition: service_healthy

  recovery:
    build:
      context: .
      dockerfile: recovery/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data:ro
      - ./backups:/backups
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - agent-core

  # ── Local inference engines (optional — started by ./install based on choice) ──

  nova-ollama:
    image: ollama/ollama:latest
    profiles: ["local-ollama"]
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nova-llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    profiles: ["local-llamacpp"]
    volumes:
      - llamacpp-models:/models
    environment:
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_CTX_SIZE: "4096"
      LLAMA_ARG_THREADS: "4"
      LLAMA_ARG_MODEL: /models/${LOCAL_COMPLETION_MODEL:-llama-3.2-3b-q4.gguf}
    ports:
      - "11435:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  nova-vllm:
    image: vllm/vllm-openai:latest
    profiles: ["local-vllm"]
    volumes:
      - vllm-cache:/root/.cache/huggingface
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
    command: >
      --model ${VLLM_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
      --host 0.0.0.0
      --port 8000
    ports:
      - "11436:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s

  nova-sglang:
    image: lmsysorg/sglang:latest
    profiles: ["local-sglang"]
    volumes:
      - sglang-cache:/root/.cache/huggingface
    environment:
      SGLANG_MODEL: ${SGLANG_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
    command: >
      python -m sglang.launch_server
      --model-path ${SGLANG_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      --host 0.0.0.0
      --port 30000
    ports:
      - "11437:30000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:30000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

volumes:
  ollama-data:
  llamacpp-models:
  vllm-cache:
  sglang-cache:
