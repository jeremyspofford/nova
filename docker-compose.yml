# docker-compose.yml
version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nova}
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  agent-core:
    build:
      context: .
      dockerfile: agent-core/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  memory-service:
    build:
      context: .
      dockerfile: memory-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
      REDIS_URL: redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  llm-gateway:
    build:
      context: .
      dockerfile: llm-gateway/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  voice-gateway:
    build:
      context: .
      dockerfile: voice-gateway/Dockerfile
    env_file: .env
    ports:
      - "8003:8003"
    profiles: ["voice"]

  chat-surface:
    build:
      context: .
      dockerfile: chat-surface/Dockerfile
    env_file: .env
    environment:
      AGENT_CORE_URL: http://agent-core:8000
    ports:
      - "8004:8004"
    depends_on:
      agent-core:
        condition: service_healthy

  recovery:
    build:
      context: .
      dockerfile: recovery/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-nova}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/data:ro
      - ./backups:/backups
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - agent-core
