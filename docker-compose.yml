# Pinned so container labels/names are stable regardless of the checkout
# directory — the inference-control sidecar targets this project by name.
name: nova

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova-dev-password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nova"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-nova-dev-password}@postgres:5432/nova
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NOVA_AUTH_TOKEN: ${NOVA_AUTH_TOKEN:-}
      NOVA_TRUST_LOCALHOST: ${NOVA_TRUST_LOCALHOST:-true}
      OKF_MEMORY_DIR: /app/data/memory
      # shown read-only in Settings → Storage — the mount itself is fixed at
      # container-create time and can't be changed from inside the container
      NOVA_MEMORY_DIR_HOST: ${NOVA_MEMORY_DIR:-./data/memory}
      # ditto: where the bundled model weights live (empty = default docker
      # volumes). Display-only for the backend; the actual mounts are on the
      # ollama/kokoro/whisper services via docker-compose.models.yml.
      NOVA_MODELS_DIR: ${NOVA_MODELS_DIR:-}
      SEARXNG_URL: http://searxng:8080
      INFERENCE_CONTROL_URL: http://inference-control:9911
      MCP_RUNNER_URL: http://mcp-runner:8100
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # NOVA_MEMORY_DIR: point memory anywhere plain files can live — a NAS
      # mount, an Obsidian vault folder, another disk. Markdown in, markdown
      # out; the index rescans on startup and reindexes on write.
      - ${NOVA_MEMORY_DIR:-./data/memory}:/app/data/memory
      - ./backend:/app/backend:cached
      # tiny shared control channel to the inference-control sidecar: the
      # backend writes the operator-chosen model-store path here, the sidecar
      # reads it when (re)creating ollama. Not a data path — one text file.
      - nova_state:/state
    develop:
      watch:
        - path: ./backend/app
          action: sync
          target: /app/backend/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bundled local inference (optional): docker compose --profile inference up -d
  # CPU works for small models; for NVIDIA GPU add a deploy.resources.reservations
  # block (documented in README). Host-run Ollama: set the URL in Settings → Inference.
  ollama:
    image: ollama/ollama:latest
    profiles: ["inference"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  # Docker control sidecar: the ONLY container holding the docker socket
  # (root-equivalent on the host — the backend never mounts it). Exposes a
  # fixed-verb API (status/start/stop of the bundled ollama service, nothing
  # parameterized) on the compose network only — no published ports.
  inference-control:
    build: ./inference-control
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/compose/docker-compose.yml:ro
      - ./docker-compose.gpu.yml:/compose/docker-compose.gpu.yml:ro
      - ./docker-compose.models.yml:/compose/docker-compose.models.yml:ro
      # operator-chosen model-store path, written by the backend (read-only
      # here — the sidecar only ever reads where to bind, never sets it)
      - nova_state:/state:ro
    environment:
      # auto: use the GPU override when the docker NVIDIA runtime exists;
      # on/off force it (e.g. OLLAMA_GPU=on for Docker Desktop setups that
      # support --gpus without advertising an nvidia runtime)
      OLLAMA_GPU: ${OLLAMA_GPU:-auto}
      # absolute host path to relocate the bundled model store; when set, the
      # sidecar merges docker-compose.models.yml so the ollama toggle recreates
      # the container binding $NOVA_MODELS_DIR/ollama. Empty = default volume.
      NOVA_MODELS_DIR: ${NOVA_MODELS_DIR:-}
    restart: unless-stopped

  # stdio MCP server bridge (docs/plans/mcp-client.md, phase 4). Spawns
  # operator-registered stdio MCP servers as subprocesses on the backend's
  # behalf — no Docker socket, no DB credentials, no published ports.
  # Every command it runs comes from an edit_mode-gated mcp_servers row,
  # never from an agent or the network directly.
  mcp-runner:
    build: ./mcp-runner
    restart: unless-stopped

  # Optional batteries-included reachability: joins YOUR tailnet as node
  # "nova" and serves the web origin at https://nova.<tailnet>.ts.net with
  # a real certificate — identical on WSL2/Linux/macOS, no host Tailscale
  # install. Opt in: put TS_AUTHKEY in .env, then
  #   docker compose --profile tailscale up -d
  # Userspace networking: no NET_ADMIN, no /dev/net/tun — inbound proxy only.
  # Node identity persists in the volume; the auth key is consumed once.
  tailscale:
    image: tailscale/tailscale:latest
    profiles: ["tailscale"]
    hostname: nova
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_USERSPACE: "true"
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    depends_on:
      - web
    restart: unless-stopped

  # Nova's voice (optional): docker compose --profile voice up -d
  # Local Kokoro TTS (kokoro-onnx, CPU — faster than realtime on a modern
  # CPU; no GPU wiring needed). Model files (~340 MB) download to the
  # volume on first start; watch `docker compose logs -f kokoro`.
  kokoro:
    build: ./kokoro
    profiles: ["voice"]
    ports:
      - "127.0.0.1:8880:8880"
    volumes:
      - kokoro_models:/models
    restart: unless-stopped

  # Nova's ears (optional, same `voice` profile): faster-whisper STT for
  # push-to-talk. CPU + int8 by default (sub-second for short utterances);
  # model files download to the volume on first start. Set WHISPER_MODEL to
  # trade speed for accuracy (tiny|base|small|medium).
  whisper:
    build: ./whisper
    profiles: ["voice"]
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - whisper_models:/models
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-nova-searxng-dev-secret}
      SEARXNG_BASE_URL: http://searxng:8080/
    ports:
      - "127.0.0.1:8380:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached

  # The phone-facing entry: built PWA + API behind one origin. Bound to
  # localhost only — expose it via `tailscale serve` (recommended) or a
  # tunnel, and set NOVA_AUTH_TOKEN first.
  web:
    build:
      context: ./frontend
      target: web
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_models:
  tailscale_state:
  kokoro_models:
  whisper_models:
  nova_state:
