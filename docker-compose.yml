version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nova-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "nova"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://nova:${POSTGRES_PASSWORD:-nova-dev-password}@postgres:5432/nova
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OKF_MEMORY_DIR: /app/data/memory
      SEARXNG_URL: http://searxng:8080
      CONTEXT_BUDGET_OPENROUTER: ${CONTEXT_BUDGET_OPENROUTER:-24000}
      CONTEXT_BUDGET_OLLAMA: ${CONTEXT_BUDGET_OLLAMA:-6000}
      COMPACTION_MIN_AGED: ${COMPACTION_MIN_AGED:-10}
      COMPACTION_MODEL: ${COMPACTION_MODEL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/memory:/app/data/memory
      - ./backend:/app/backend:cached
    develop:
      watch:
        - path: ./backend/app
          action: sync
          target: /app/backend/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET:-nova-searxng-dev-secret}
      SEARXNG_BASE_URL: http://searxng:8080/
    ports:
      - "127.0.0.1:8380:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
