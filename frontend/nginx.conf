# Same-origin serving for the PWA: the built app and the API behind ONE
# origin, so the service worker scope and the auth token behave. Reach it
# via tailscale serve (recommended) or a tunnel — this listener itself is
# bound to 127.0.0.1 on the host by compose.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve the backend per request via Docker's embedded DNS instead
    # of pinning the IP nginx saw at startup — recreating the backend
    # container (new IP) must not 502 the phone path until web restarts.
    # proxy_pass with a variable is what forces the runtime lookup.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8000;

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # overwritten (never appended) — the backend's local-vs-remote trust
        # decision depends on this being nginx's own view of the client
        proxy_set_header X-Real-IP $remote_addr;
        # SSE: stream chat tokens as they arrive, no buffering, long reads
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location = /health {
        proxy_pass $backend_upstream;
    }

    # SPA fallback; hashed assets can cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Self-hosted VAD assets: the onnxruntime-web .mjs glue must carry a JS
    # MIME type or the browser refuses the module import (strict MIME check);
    # long-cache the big wasm/model too — they're immutable per build.
    location /vad/ {
        # a location-level types{} REPLACES the global map, so the worklet .js
        # and the ort .mjs both need a JS MIME here or addModule/import reject
        types { text/javascript js mjs; application/wasm wasm; }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000";
    }
    # The PWA update path: the entry files must revalidate on every check or
    # the installed app keeps opening last build from the browser cache.
    # (Hashed /assets stay immutable above — only the doors get no-cache.)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
