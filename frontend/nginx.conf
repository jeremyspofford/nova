# Same-origin serving for the PWA: the built app and the API behind ONE
# origin, so the service worker scope and the auth token behave. Reach it
# via tailscale serve (recommended) or a tunnel — this listener itself is
# bound to 127.0.0.1 on the host by compose.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # overwritten (never appended) — the backend's local-vs-remote trust
        # decision depends on this being nginx's own view of the client
        proxy_set_header X-Real-IP $remote_addr;
        # SSE: stream chat tokens as they arrive, no buffering, long reads
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location = /health {
        proxy_pass http://backend:8000;
    }

    # SPA fallback; hashed assets can cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # Self-hosted VAD assets: the onnxruntime-web .mjs glue must carry a JS
    # MIME type or the browser refuses the module import (strict MIME check);
    # long-cache the big wasm/model too — they're immutable per build.
    location /vad/ {
        # a location-level types{} REPLACES the global map, so the worklet .js
        # and the ort .mjs both need a JS MIME here or addModule/import reject
        types { text/javascript js mjs; application/wasm wasm; }
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
