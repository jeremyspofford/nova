[pytest]
asyncio_mode = auto
testpaths = .
pythonpath = .. ../nova-worker-common ../nova-contracts
# Per-test timeout so one no-deadline poll can't hang the whole suite
# (2026-07-05: test_decomposition_simple_path stalled `make test` for 25+ min).
# signal method: the offending test fails and the session continues;
# thread method would kill the entire session on the first timeout.
timeout = 180
timeout_method = signal
