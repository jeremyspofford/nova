# Nova AI Platform — AMD ROCm GPU overlay
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.rocm.yml up -d
#
#   OR set NOVA_GPU=rocm in .env and run ./scripts/setup.sh
#
# Prerequisites (Linux only — ROCm is not supported on Windows):
#   1. Install ROCm: https://rocm.docs.amd.com/en/latest/deploy/linux/
#   2. Add user to 'render' and 'video' groups:
#      sudo usermod -aG render,video $LOGNAME
#   3. Verify: docker run --rm --device /dev/kfd --device /dev/dri \
#              rocm/pytorch:latest rocminfo
#
# Supported AMD GPUs (RX 6000 / 7000 series, Instinct MI series):
#   https://rocm.docs.amd.com/en/latest/release/gpu_os_support.html
# ─────────────────────────────────────────────────────────────────────────────

services:
  nova-ollama:
    # ROCm-enabled Ollama image (Ollama ships separate ROCm builds)
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd:/dev/kfd      # kernel fusion driver (AMD GPU compute)
      - /dev/dri:/dev/dri      # direct rendering infrastructure
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-}
      # Set HSA_OVERRIDE_GFX_VERSION if your GPU isn't auto-detected, e.g.:
      # HSA_OVERRIDE_GFX_VERSION=10.3.0   # RX 6000 series (RDNA2)
      # HSA_OVERRIDE_GFX_VERSION=11.0.0   # RX 7000 series (RDNA3)
